<script type="text/babel">

// ─── Shared pixel icon primitive (16×16 crisp) ───
function PxIcon({ name, size = 16, color = '#1A1410' }) {
  const G = {
    cart: [[2,4,2,2],[4,5,2,2],[6,5,8,2],[13,6,1,4],[5,10,8,2],[5,12,1,2],[11,12,1,2]],
    check: [[3,7,2,2],[5,9,2,2],[7,11,2,2],[9,9,2,2],[11,7,2,2],[13,5,2,2]],
    plus: [[7,3,2,10],[3,7,10,2]],
    apple: [[6,2,2,2],[4,5,8,2],[3,7,10,4],[4,11,8,2],[6,13,4,1]],
    milk: [[5,2,6,2],[5,4,1,2],[10,4,1,2],[4,6,8,8]],
    bread: [[3,5,10,2],[2,7,12,4],[3,11,10,2]],
    drink: [[5,2,6,1],[5,3,1,11],[10,3,1,11],[6,13,4,1]],
    logo: [[3,3,10,2],[3,5,2,2],[5,7,2,2],[7,9,2,2],[9,11,2,2],[3,13,10,2]],
    share: [[11,2,3,3],[2,7,3,3],[11,12,3,3],[5,7,6,1],[5,9,6,1]],
    gear: [[7,2,2,2],[7,12,2,2],[2,7,2,2],[12,7,2,2],[4,4,2,2],[10,4,2,2],[4,10,2,2],[10,10,2,2],[6,6,4,4]],
    edit: [[10,2,4,4],[2,10,8,4],[4,8,6,2]],
    mic: [[6,2,4,6],[3,9,10,1],[7,11,2,3]],
    sparkle: [[7,2,2,4],[7,10,2,4],[2,7,4,2],[10,7,4,2]],
    chevronL: [[10,4,2,2],[8,6,2,2],[6,8,2,2],[8,10,2,2],[10,12,2,2]],
    chevron: [[6,4,2,2],[8,6,2,2],[10,8,2,2],[8,10,2,2],[6,12,2,2]],
    menu: [[2,4,12,2],[2,8,12,2],[2,12,12,2]],
    user: [[6,2,4,4],[3,8,10,7]],
    template: [[3,2,10,12],[5,4,6,1],[5,6,6,1],[5,8,4,1]],
    heart: [[3,4,4,2],[9,4,4,2],[2,6,12,2],[3,8,10,2],[5,10,6,2],[6,12,4,1]],
    trash: [[3,3,10,1],[5,2,6,1],[4,5,8,10]],
    star: [[7,2,2,2],[5,4,6,2],[3,6,10,2],[5,8,2,2],[9,8,2,2]],
    search: [[3,3,6,2],[3,7,6,2],[3,5,2,2],[7,5,2,2],[9,9,2,2],[11,11,2,2]],
  };
  const rects = G[name] || [];
  return <svg width={size} height={size} viewBox="0 0 16 16" style={{ display:'block', shapeRendering:'crispEdges' }}>
    {rects.map(([x,y,w,h],i)=><rect key={i} x={x} y={y} width={w} height={h} fill={color}/>)}
  </svg>;
}

const display = { fontFamily: '"Silkscreen", monospace', letterSpacing: '0.02em' };
const ui = { fontFamily: '"Inter", system-ui, sans-serif' };
const mono = { fontFamily: '"JetBrains Mono", monospace' };
const pxFont = { fontFamily: '"VT323", monospace' };

// ══════════════════ VARIANT 1 · CURRENT ══════════════════
const cur = { primary:'#2E2E2E', bg:'#F5F5F5', disabled:'#6B6B6B', danger:'#D32F2F', accent:'#4CAF50', accentLight:'#E8F5E9' };
const catCur = {'Owoce i warzywa':'#A5D6A7','Nabiał':'#90CAF9','Pieczywo':'#FFCC80'};
function CurIconS({ n, s=18, c='#2E2E2E' }) {
  const P = {
    cart:<><circle cx="6" cy="14" r="1.3" fill={c}/><circle cx="13" cy="14" r="1.3" fill={c}/><path d="M2 3h3l2 8h9l1.5-6H7" stroke={c} strokeWidth="1.5" fill="none" strokeLinejoin="round"/></>,
    plus:<path d="M8 2v12M2 8h12" stroke={c} strokeWidth="2.2" strokeLinecap="round"/>,
    share:<><circle cx="4" cy="8" r="1.8" stroke={c} strokeWidth="1.4" fill="none"/><circle cx="12" cy="4" r="1.8" stroke={c} strokeWidth="1.4" fill="none"/><circle cx="12" cy="12" r="1.8" stroke={c} strokeWidth="1.4" fill="none"/><path d="M6 7l5-2M6 9l5 2" stroke={c} strokeWidth="1.2"/></>,
    palette:<><circle cx="8" cy="8" r="5" stroke={c} strokeWidth="1.4" fill="none"/><circle cx="6" cy="6" r="1" fill={c}/><circle cx="10" cy="5.5" r="1" fill={c}/><circle cx="10.5" cy="10" r="1" fill={c}/></>,
    gear:<><circle cx="8" cy="8" r="2" stroke={c} strokeWidth="1.4" fill="none"/><circle cx="8" cy="8" r="5" stroke={c} strokeWidth="1.4" fill="none" strokeDasharray="1.5 1.5"/></>,
    logout:<><path d="M9 4v-.5a1.5 1.5 0 00-1.5-1.5h-3A1.5 1.5 0 003 3.5v9A1.5 1.5 0 004.5 14h3A1.5 1.5 0 009 12.5V12" stroke={c} strokeWidth="1.4" fill="none"/><path d="M7 8h7m0 0l-2-2m2 2l-2 2" stroke={c} strokeWidth="1.4" strokeLinecap="round" fill="none"/></>,
    check:<path d="M3 8l3 3 7-7" stroke={c} strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/>,
    drag:<><circle cx="5" cy="5" r="1" fill={c}/><circle cx="11" cy="5" r="1" fill={c}/><circle cx="5" cy="8" r="1" fill={c}/><circle cx="11" cy="8" r="1" fill={c}/><circle cx="5" cy="11" r="1" fill={c}/><circle cx="11" cy="11" r="1" fill={c}/></>,
    trash:<path d="M4 5h8m-7 0v8a1 1 0 001 1h4a1 1 0 001-1V5M6 5V3.5a1 1 0 011-1h2a1 1 0 011 1V5" stroke={c} strokeWidth="1.3" fill="none" strokeLinecap="round"/>,
    arrowL:<path d="M10 4L6 8l4 4" stroke={c} strokeWidth="1.8" fill="none" strokeLinecap="round" strokeLinejoin="round"/>,
    robot:<><rect x="3" y="5" width="10" height="8" stroke={c} strokeWidth="1.3" fill="none"/><circle cx="6" cy="8.5" r="1" fill={c}/><circle cx="10" cy="8.5" r="1" fill={c}/><path d="M8 5V3" stroke={c} strokeWidth="1.3"/></>,
  };
  return <svg width={s} height={s} viewBox="0 0 16 16">{P[n]}</svg>;
}
function CurrentDashboard() {
  return (
    <div style={{ background: cur.accentLight, height:'100%', fontFamily:'-apple-system, system-ui, sans-serif' }}>
      <div style={{ background: cur.accent, padding:'54px 12px 10px', display:'flex', alignItems:'flex-end', justifyContent:'space-between' }}>
        <div>
          <div style={{ color:'#fff', fontSize:24, fontWeight:900 }}>Moje listy</div>
          <div style={{ color:'rgba(255,255,255,0.8)', fontSize:12, marginTop:4 }}>4 listy</div>
        </div>
        <div style={{ display:'flex', gap:4, alignItems:'center' }}>
          {['palette','gear'].map(n=>(
            <div key={n} style={{ width:36, height:36, border:'2px solid rgba(255,255,255,0.3)', display:'flex', alignItems:'center', justifyContent:'center' }}><CurIconS n={n} c="#fff" s={18}/></div>
          ))}
          <div style={{ background: cur.danger, border:`2px solid ${cur.primary}`, padding:'8px 10px', display:'flex', alignItems:'center', gap:4 }}>
            <CurIconS n="logout" c="#fff" s={13}/><span style={{color:'#fff', fontSize:12, fontWeight:700}}>Wyloguj</span>
          </div>
        </div>
      </div>
      <div style={{ display:'flex', gap:8, padding:8 }}>
        {[{i:'plus',l:'Nowa lista'},{i:'share',l:'Dołącz'},{i:'robot',l:'Z szablonu'}].map(a=>(
          <div key={a.l} style={{ flex:1, background:cur.accent, border:`2px solid ${cur.primary}`, padding:'14px 4px', display:'flex', flexDirection:'column', alignItems:'center', gap:4 }}>
            <CurIconS n={a.i} c="#fff" s={26}/><div style={{color:'#fff',fontSize:10,fontWeight:700}}>{a.l}</div>
          </div>
        ))}
      </div>
      <div style={{ padding:'0 8px', display:'flex', flexDirection:'column', gap:8 }}>
        {[{t:'Tygodniowe zakupy',c:12,k:'X7K2PQ'},{t:'Grill weekend',c:8,d:true},{t:'Biuro',c:5},{t:'Apteka',c:3,k:'M9R4LA'}].map(l=>(
          <div key={l.t} style={{ background:'#fff', border:`2px solid ${cur.primary}`, padding:12 }}>
            <div style={{ display:'flex', alignItems:'center' }}>
              <div style={{ marginRight:8 }}><CurIconS n={l.d?'check':'cart'} c={l.d?cur.accent:cur.primary} s={22}/></div>
              <div style={{ flex:1 }}>
                <div style={{ fontWeight:700, fontSize:15, color:cur.primary }}>{l.t}</div>
                <div style={{ fontSize:11, color:l.d?cur.accent:cur.disabled, marginTop:2 }}>{l.d?'Zrealizowana':`Produkty: ${l.c}`}</div>
              </div>
              {l.k&&<div style={{background:cur.accent,border:`2px solid ${cur.primary}`,padding:'3px 5px',marginRight:6}}><div style={{color:'#fff',fontSize:9,fontWeight:700}}>{l.k}</div></div>}
              <CurIconS n="trash" c={cur.danger} s={15}/>
              <div style={{ marginLeft:6 }}><CurIconS n="drag" c={cur.disabled} s={15}/></div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}
function CurrentDetail() {
  return (
    <div style={{ background:cur.accentLight, height:'100%', fontFamily:'-apple-system, system-ui, sans-serif' }}>
      <div style={{ background:cur.accent, padding:'54px 8px 8px', display:'flex', alignItems:'center', gap:6 }}>
        <div style={{ width:34, height:34, border:'2px solid rgba(255,255,255,0.3)', display:'flex', alignItems:'center', justifyContent:'center' }}><CurIconS n="arrowL" c="#fff" s={16}/></div>
        <div style={{ flex:1, color:'#fff', fontWeight:900, fontSize:17 }}>Tygodniowe zakupy</div>
        <div style={{ width:34, height:34, border:'2px solid rgba(255,255,255,0.3)', display:'flex', alignItems:'center', justifyContent:'center' }}><CurIconS n="palette" c="#fff" s={16}/></div>
      </div>
      <div style={{ background:cur.accent, padding:'4px 8px', textAlign:'center', color:'#fff', fontSize:11, fontWeight:700 }}>Kod: X7K2PQ</div>
      <div style={{ background:'#fff', borderBottom:`2px solid ${cur.primary}` }}>
        <div style={{ display:'flex', border:`2px solid ${cur.primary}` }}>
          <div style={{ flex:1, background:cur.accent, padding:9, textAlign:'center', color:'#fff', fontSize:10, fontWeight:700 }}>RĘCZNIE</div>
          <div style={{ flex:1, background:cur.bg, padding:9, textAlign:'center', color:cur.primary, fontSize:10, fontWeight:700 }}>AI</div>
        </div>
        <div style={{ padding:8, display:'flex', flexDirection:'column', gap:8 }}>
          <div>
            <div style={{ fontSize:10, fontWeight:700, color:cur.disabled, marginBottom:3 }}>NAZWA:</div>
            <div style={{ border:`2px solid ${cur.primary}`, padding:'9px 8px', fontSize:13, color:cur.disabled }}>Nazwa produktu</div>
          </div>
          <div style={{ background:cur.accent, border:`2px solid ${cur.primary}`, padding:9, textAlign:'center', color:'#fff', fontSize:12, fontWeight:700 }}>+ DODAJ</div>
        </div>
      </div>
      <div style={{ padding:8, display:'flex', flexDirection:'column', gap:8 }}>
        {[{c:'Owoce i warzywa',i:[{n:'Jabłka',q:'2 kg'},{n:'Banany',q:'6 szt',d:true},{n:'Pomidory',q:'500 g'}]},{c:'Nabiał',i:[{n:'Mleko',q:'2 l'}]},{c:'Pieczywo',i:[{n:'Chleb',q:'1 szt'}]}].map(g=>(
          <div key={g.c} style={{ background:'#fff', border:`2px solid ${cur.primary}` }}>
            <div style={{ background:catCur[g.c], padding:'5px 8px', borderBottom:`2px solid ${cur.primary}`, fontWeight:700, fontSize:12 }}>{g.c} ({g.i.length})</div>
            {g.i.map((it,idx)=>(
              <div key={idx} style={{ display:'flex', alignItems:'center', padding:'5px 8px', borderBottom:idx<g.i.length-1?`2px solid ${cur.bg}`:'none' }}>
                <div style={{ width:18, height:18, border:`2px solid ${it.d?cur.accent:cur.primary}`, background:'#fff', marginRight:7, display:'flex', alignItems:'center', justifyContent:'center' }}>{it.d&&<div style={{width:9,height:9,background:cur.accent}}/>}</div>
                <div style={{ flex:1 }}>
                  <div style={{ fontSize:13, color:it.d?cur.disabled:cur.primary, textDecoration:it.d?'line-through':'none' }}>{it.n}</div>
                  <div style={{ fontSize:10, color:cur.disabled }}>{it.q}</div>
                </div>
              </div>
            ))}
          </div>
        ))}
      </div>
    </div>
  );
}

// ══════════════════ VARIANT 2 · NEOPIXEL ══════════════════
const np = { ink:'#1A1410', paper:'#FAF6EF', panel:'#FFFFFF', soft:'#F0E9DA', muted:'#8A7E6D', accent:'#FF5D2E', lime:'#C7E84F', sky:'#7CC9F5' };
const catNp = {'Owoce i warzywa':'#C7E84F','Nabiał':'#7CC9F5','Pieczywo':'#FFCB7A','Mięso':'#FFB3C8','Napoje':'#C9A6F0'};
const npShadow = (o=4, c='#1A1410') => `${o}px ${o}px 0 0 ${c}`;

function NeoDashboard({ accent = np.accent }) {
  return (
    <div style={{ background:np.paper, height:'100%', ...ui, color:np.ink }}>
      <div style={{ padding:'54px 16px 14px', borderBottom:`2px solid ${np.ink}` }}>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:14 }}>
          <div style={{ display:'flex', alignItems:'center', gap:10 }}>
            <div style={{ width:34, height:34, background:accent, border:`2px solid ${np.ink}`, boxShadow:npShadow(3), display:'flex', alignItems:'center', justifyContent:'center' }}><PxIcon name="logo" size={18} color={np.ink}/></div>
            <div style={{ ...display, fontSize:14 }}>ZING</div>
          </div>
          <div style={{ display:'flex', gap:6 }}>
            {['share','gear','user'].map(n=>(<div key={n} style={{ width:32, height:32, background:np.panel, border:`2px solid ${np.ink}`, display:'flex', alignItems:'center', justifyContent:'center' }}><PxIcon name={n} size={14} color={np.ink}/></div>))}
          </div>
        </div>
        <div style={{ ...display, fontSize:22, marginBottom:4 }}>Moje listy</div>
        <div style={{ ...mono, fontSize:11, color:np.muted, textTransform:'uppercase' }}>4 aktywne · 23 produkty</div>
      </div>
      <div style={{ padding:14, display:'grid', gridTemplateColumns:'1fr 1fr', gap:10 }}>
        <div style={{ gridColumn:'1/-1', background:accent, border:`2px solid ${np.ink}`, boxShadow:npShadow(4), padding:'14px 16px', display:'flex', alignItems:'center', justifyContent:'space-between' }}>
          <div>
            <div style={{ ...display, fontSize:13, color:np.ink, marginBottom:4 }}>+ NOWA LISTA</div>
            <div style={{ fontSize:11, color:np.ink, opacity:0.75 }}>Zacznij od zera lub z szablonu</div>
          </div>
          <PxIcon name="plus" size={28} color={np.ink}/>
        </div>
        <div style={{ background:np.panel, border:`2px solid ${np.ink}`, boxShadow:npShadow(3), padding:12 }}>
          <PxIcon name="share" size={18} color={np.ink}/>
          <div style={{ ...display, fontSize:10, marginTop:6 }}>DOŁĄCZ</div>
          <div style={{ fontSize:10, color:np.muted, marginTop:2 }}>Kod 6 znaków</div>
        </div>
        <div style={{ background:np.lime, border:`2px solid ${np.ink}`, boxShadow:npShadow(3), padding:12 }}>
          <PxIcon name="template" size={18} color={np.ink}/>
          <div style={{ ...display, fontSize:10, marginTop:6 }}>SZABLON</div>
          <div style={{ fontSize:10, color:np.ink, opacity:0.7, marginTop:2 }}>7 zapisanych</div>
        </div>
      </div>
      <div style={{ padding:'4px 16px 8px', display:'flex', alignItems:'center', justifyContent:'space-between' }}>
        <div style={{ ...display, fontSize:11 }}>PRZYPIĘTE</div>
        <div style={{ ...mono, fontSize:10, color:np.muted }}>SORT ▾</div>
      </div>
      <div style={{ padding:'0 14px 14px', display:'flex', flexDirection:'column', gap:10 }}>
        {[
          {t:'Tygodniowe zakupy',c:12,d:4,k:'X7K2PQ',tint:accent},
          {t:'Grill weekend',c:8,d:8,done:true},
          {t:'Biuro',c:5,d:1},
        ].map(l=>(
          <div key={l.t} style={{ background:l.done?np.soft:np.panel, border:`2px solid ${np.ink}`, boxShadow:npShadow(3), padding:12 }}>
            <div style={{ display:'flex', gap:10 }}>
              <div style={{ width:40, height:40, background:l.done?np.lime:(l.tint||np.soft), border:`2px solid ${np.ink}`, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
                <PxIcon name={l.done?'check':'cart'} size={20} color={np.ink}/>
              </div>
              <div style={{ flex:1, minWidth:0 }}>
                <div style={{ display:'flex', alignItems:'center', gap:6, marginBottom:4 }}>
                  <div style={{ ...display, fontSize:12 }}>{l.t}</div>
                  {l.k&&<div style={{ ...mono, fontSize:9, background:np.ink, color:np.paper, padding:'2px 4px' }}>{l.k}</div>}
                </div>
                <div style={{ fontSize:11, color:np.muted, marginBottom:6 }}>{l.done?'Zrealizowana':`${l.d} z ${l.c} kupionych`}</div>
                <div style={{ display:'flex', gap:2, height:6 }}>
                  {Array.from({length:12}).map((_,i)=>(<div key={i} style={{ flex:1, background:i<l.d?np.ink:np.soft, border:`1px solid ${np.ink}` }}/>))}
                </div>
              </div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function NeoDetail({ accent = np.accent }) {
  return (
    <div style={{ background:np.paper, height:'100%', ...ui, color:np.ink }}>
      <div style={{ padding:'54px 14px 12px', borderBottom:`2px solid ${np.ink}`, background:accent }}>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:10 }}>
          <div style={{ width:34, height:34, background:np.paper, border:`2px solid ${np.ink}`, display:'flex', alignItems:'center', justifyContent:'center' }}><PxIcon name="chevronL" size={14} color={np.ink}/></div>
          <div style={{ display:'flex', gap:6 }}>
            <div style={{ width:34, height:34, background:np.paper, border:`2px solid ${np.ink}`, display:'flex', alignItems:'center', justifyContent:'center' }}><PxIcon name="share" size={14} color={np.ink}/></div>
            <div style={{ width:34, height:34, background:np.paper, border:`2px solid ${np.ink}`, display:'flex', alignItems:'center', justifyContent:'center' }}><PxIcon name="menu" size={14} color={np.ink}/></div>
          </div>
        </div>
        <div style={{ ...display, fontSize:20, color:np.ink, marginBottom:8, lineHeight:1.15 }}>Tygodniowe<br/>zakupy</div>
        <div style={{ display:'flex', alignItems:'center', gap:8 }}>
          <div style={{ ...mono, fontSize:10, background:np.ink, color:np.paper, padding:'3px 6px' }}>KOD · X7K2PQ</div>
          <div style={{ fontSize:11, color:np.ink, opacity:0.8 }}>3 osoby · 4/12</div>
        </div>
      </div>
      <div style={{ padding:12, borderBottom:`2px solid ${np.ink}`, background:np.panel }}>
        <div style={{ display:'flex', marginBottom:10 }}>
          <div style={{ flex:1, background:np.ink, color:np.paper, padding:'6px 10px', ...display, fontSize:10, textAlign:'center', border:`2px solid ${np.ink}` }}>+ RĘCZNIE</div>
          <div style={{ flex:1, background:np.panel, padding:'6px 10px', ...display, fontSize:10, textAlign:'center', border:`2px solid ${np.ink}`, borderLeft:'none' }}>✦ AI</div>
        </div>
        <div style={{ display:'flex', gap:8 }}>
          <div style={{ flex:1, border:`2px solid ${np.ink}`, padding:'10px', fontSize:13, color:np.muted }}>np. 2x mleko, chleb...</div>
          <div style={{ width:44, background:np.lime, border:`2px solid ${np.ink}`, display:'flex', alignItems:'center', justifyContent:'center', boxShadow:npShadow(2) }}><PxIcon name="mic" size={18} color={np.ink}/></div>
        </div>
        <div style={{ display:'flex', alignItems:'center', gap:4, marginTop:8, ...mono, fontSize:10, color:np.muted }}>
          <PxIcon name="sparkle" size={10} color={np.muted}/><span>AI: 4/5 zapytań dziś</span>
        </div>
      </div>
      <div style={{ padding:12, display:'flex', flexDirection:'column', gap:12 }}>

    milk:<><path d="M9.2 3h5.6v2l1.2 2.2v11.3a1.5 1.5 0 01-1.5 1.5H9.5A1.5 1.5 0 018 18.5V7.2L9.2 5z"/><path d="M8 11h8"/></>,

const TWEAK_DEFAULS = /*EDITMODE-BEGIN*/{
  "neoAccent": "#FF5D2E",
  "popAccent": "#FF5D2E",
  "modAccent": "#5B5BF5",
  "showTerminal": true
}/*EDITMODE-END*/;

function useTweaks() {
  const [t, setT] = React.useState(TWEAK_DEFAULS);
  const [open, setOpen] = React.useState(false);
  React.useEffect(()=>{
    const h = (e)=>{ if(e.data?.type==='__activate_edit_mode') setOpen(true); if(e.data?.type==='__deactivate_edit_mode') setOpen(false); };
    window.addEventListener('message', h);
    window.parent.postMessage({type:'__edit_mode_available'},'*');
    return ()=>window.removeEventListener('message', h);
  },[]);
  const set = (k,v)=>{ setT(p=>({...p,[k]:v})); window.parent.postMessage({type:'__edit_mode_set_keys', edits:{[k]:v}},'*'); };
  return { t, open, set };
}

function TweaksPanel({ t, open, set }) {
  if (!open) return null;
  const swatches = ['#FF5D2E','#4CAF50','#2196F3','#9C27B0','#FF9800','#FFD12E','#E91E63'];
  return <div style={{ position:'fixed', bottom:20, right:20, zIndex:9999, background:'#fff', border:'2px solid #1A1410', boxShadow:'6px 6px 0 0 #1A1410', padding:16, width:260, ...ui }}>
    <div style={{ ...display, fontSize:12, marginBottom:10, paddingBottom:8, borderBottom:'1.5px solid #1A1410' }}>TWEAKS</div>
    <div style={{ fontSize:11, fontWeight:700, color:'#8A7E6D', marginBottom:6 }}>NEOPIXEL ACCENT</div>
    <div style={{ display:'flex', gap:6, flexWrap:'wrap', marginBottom:12 }}>
      {swatches.map(c=>(<div key={c} onClick={()=>set('neoAccent',c)} style={{ width:28, height:28, background:c, border:t.neoAccent===c?'3px solid #1A1410':'2px solid #1A1410', cursor:'pointer', boxShadow:t.neoAccent===c?'2px 2px 0 0 #1A1410':'none' }}/>))}
    </div>
    <div style={{ fontSize:11, fontWeight:700, color:'#8A7E6D', marginBottom:6 }}>POP ACCENT</div>
    <div style={{ display:'flex', gap:6, flexWrap:'wrap', marginBottom:12 }}>
      {swatches.map(c=>(<div key={c} onClick={()=>set('popAccent',c)} style={{ width:28, height:28, background:c, border:t.popAccent===c?'3px solid #1A1410':'2px solid #1A1410', cursor:'pointer', boxShadow:t.popAccent===c?'2px 2px 0 0 #1A1410':'none' }}/>))}
    </div>
    <div style={{ fontSize:11, fontWeight:700, color:'#8A7E6D', marginBottom:6 }}>MODERN ACCENT</div>
    <div style={{ display:'flex', gap:6, flexWrap:'wrap', marginBottom:12 }}>
      {['#5B5BF5','#1FA855','#2E6BE6','#E5447B','#0B0B0F'].map(c=>(<div key={c} onClick={()=>set('modAccent',c)} style={{ width:28, height:28, borderRadius:'50%', background:c, border:t.modAccent===c?'3px solid #1A1410':'2px solid #ddd', cursor:'pointer' }}/>))}
    </div>
    <label style={{ display:'flex', alignItems:'center', gap:8, fontSize:12, cursor:'pointer' }}>
      <input type="checkbox" checked={t.showTerminal} onChange={e=>set('showTerminal', e.target.checked)}/>
      Pokaż wariant Retro Terminal
    </label>
  </div>;
}

// ══════════════════ APP ══════════════════
function Frame({ children }) {
  return <IOSDevice width={320} height={660}>{children}</IOSDevice>;
}
